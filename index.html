<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novedraw2.0</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="background-image"></div>
  <div class="background-overlay"></div>

  <main class="page-shell">
    <header class="hero">
      <p class="hero__tag">Novedraw Lottery</p>
      <h1>諾芙新人畢業紀念周邊抽獎</h1>
      <p class="hero__description">
        輸入名字後即可進行抽獎。大獎會進入榜單，再來一次會累積次數。
      </p>
    </header>

    <section class="dashboard">
      <section class="panel">
        <div class="panel__header">
          <h2>大獎榜單</h2>
          <button id="clearLeaderboardBtn" class="button button--ghost">清空榜單</button>
        </div>
        <ul id="leaderboardList" class="leaderboard-list"></ul>
      </section>

      <section class="panel retry-counter">
        <h2>再來一次</h2>
        <div class="retry-counter__value">
          <span id="retryCount">0</span>
        </div>
      </section>
    </section>

    <section class="draw-card">
      <div class="input-group">
        <label for="playerName" class="input-group__label">抽獎名稱</label>
        <input id="playerName" type="text" placeholder="請輸入名字" />
      </div>

      <div class="button-row">
        <button id="drawOnceBtn" class="button button--primary">抽 1 次</button>
        <button id="drawTenBtn" class="button button--secondary">抽 10 次</button>
        <button id="clearResultsBtn" class="button button--ghost">清空結果</button>
      </div>

      <section class="probability-card">
        <h2>獎項機率</h2>
        <ul id="probabilityList" class="probability-list"></ul>
      </section>

      <section class="results-section">
        <div class="results-section__header">
          <h2>抽獎結果</h2>
        </div>
        <div id="resultsContainer" class="results-container"></div>
      </section>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
