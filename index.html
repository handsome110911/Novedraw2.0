<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novedraw2.0</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="background-image"></div>
  <div class="background-overlay"></div>

  <main class="page-shell">
    <header class="hero">
      <p class="hero__tag">Novedraw Lottery</p>
      <h1>諾芙新人畢業紀念周邊抽獎</h1>
      <p class="hero__description">
        輸入名字後即可進行抽獎。大獎會進入大獎榜，普通獎會進入普通獎榜。
      </p>
    </header>

    <section class="dashboard">
      <section class="panel">
        <div class="panel__header">
          <h2>大獎榜單</h2>
          <button id="resetGrandBoardButton" class="button button--ghost">清空大獎</button>
        </div>
        <ul id="grandBoardList" class="leaderboard-list"></ul>
        <p id="grandBoardEmpty" class="panel__empty">目前還沒有大獎得主。</p>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h2>普通獎榜單</h2>
          <button id="resetNormalBoardButton" class="button button--ghost">清空普通獎</button>
        </div>
        <ul id="normalBoardList" class="leaderboard-list"></ul>
        <p id="normalBoardEmpty" class="panel__empty">目前還沒有普通獎得主。</p>
      </section>
    </section>

    <section class="draw-card">
      <div class="input-group">
        <label for="username" class="input-group__label">抽獎名稱</label>
        <input id="username" type="text" placeholder="請輸入名字" />
      </div>

      <div class="button-row">
        <button id="drawOnceButton" class="button button--primary">抽 1 次</button>
        <button id="drawTenButton" class="button button--secondary">抽 10 次</button>
        <button id="clearResultsButton" class="button button--ghost">清空結果</button>
      </div>

      <section class="probability-card">
        <h2>獎項機率</h2>
        <ul id="probabilityList" class="probability-list"></ul>
      </section>

      <section class="results-section" id="resultsSection">
        <div class="results-section__header">
          <h2>抽獎結果</h2>
        </div>
        <div id="resultsContainer" class="results-container"></div>
        <p id="resultsPlaceholder" class="results-placeholder">尚未開始抽獎。</p>
      </section>
    </section>
  </main>

  <div id="grandModal" class="modal" hidden>
    <div class="modal__backdrop"></div>
    <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="grandModalTitle">
      <p class="modal__tag">Grand Prize</p>
      <h2 id="grandModalTitle">恭喜中獎</h2>
      <p id="grandModalMessage" class="modal__message">永Ban再見</p>
      <button id="grandModalCloseButton" class="button button--primary">確認</button>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
